<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Registro de Visitas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --border: #2e2a22;
      --gold: #c9a84c;
      --gold-light: #e2c278;
      --text: #f0ead8;
      --muted: #7a7060;
      --red: #c0392b;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }

    .stat-box .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
      display: block;
    }

    .stat-box .label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--gold);
      color: var(--bg);
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red);
      color: white;
    }

    .search-box {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      width: 260px;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      border-color: var(--gold);
    }

    .search-box::placeholder {
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--gold);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.65rem;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
    }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: var(--surface);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .ip-badge {
      font-family: 'DM Mono', monospace;
      background: #1e1c17;
      border: 1px solid var(--border);
      padding: 3px 8px;
      font-size: 0.72rem;
      color: var(--gold-light);
    }

    .num-cell {
      color: var(--muted);
      font-size: 0.7rem;
    }

    .page-cell {
      color: var(--muted);
      font-size: 0.72rem;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .empty span {
      display: block;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.65rem;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container { animation: fadeIn 0.4s ease; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>Panel de Visitas</h1>
      <p>Registro de accesos al sitio</p>
    </div>
    <div class="stats">
      <div class="stat-box">
        <span class="num" id="total-num">0</span>
        <span class="label">Visitas</span>
      </div>
      <div class="stat-box">
        <span class="num" id="unique-num">0</span>
        <span class="label">IPs únicas</span>
      </div>
      <div class="stat-box">
        <span class="num" id="paises-num">0</span>
        <span class="label">Países</span>
      </div>
    </div>
  </header>

  <div class="actions">
    <input class="search-box" type="text" id="buscador" placeholder="Buscar por IP, ciudad o país..." oninput="filtrar()">
    <button class="btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
    <button class="btn btn-danger" onclick="limpiar()">🗑 Limpiar registro</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>IP</th>
          <th>Ciudad</th>
          <th>País</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Página</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <footer id="footer-info"></footer>
</div>

<script>
  let todasLasVisitas = JSON.parse(localStorage.getItem("visitas") || "[]");

  function renderTabla(visitas) {
    const tabla = document.getElementById("tabla");
    if (visitas.length === 0) {
      tabla.innerHTML = `<tr><td colspan="7" class="empty"><span>📋</span>No hay visitas registradas aún.<br>Abre las páginas del restaurante primero.</td></tr>`;
      return;
    }
    tabla.innerHTML = visitas.map((v, i) => `
      <tr>
        <td class="num-cell">${i + 1}</td>
        <td><span class="ip-badge">${v.ip || "-"}</span></td>
        <td>${v.ciudad || "-"}</td>
        <td>${v.pais || "-"}</td>
        <td>${v.fecha || "-"}</td>
        <td>${v.hora || "-"}</td>
        <td class="page-cell">${v.pagina || "-"}</td>
      </tr>
    `).join("");
  }

  function actualizarStats(visitas) {
    const ipsUnicas = new Set(visitas.map(v => v.ip)).size;
    const paisesUnicos = new Set(visitas.map(v => v.pais).filter(Boolean)).size;
    document.getElementById("total-num").textContent = todasLasVisitas.length;
    document.getElementById("unique-num").textContent = ipsUnicas;
    document.getElementById("paises-num").textContent = paisesUnicos;

    const ultima = todasLasVisitas[todasLasVisitas.length - 1];
    if (ultima) {
      document.getElementById("footer-info").textContent =
        `Última visita: ${ultima.fecha} a las ${ultima.hora} — ${ultima.ip}`;
    }
  }

  function filtrar() {
    const q = document.getElementById("buscador").value.toLowerCase();
    const filtradas = todasLasVisitas.filter(v =>
      (v.ip || "").toLowerCase().includes(q) ||
      (v.ciudad || "").toLowerCase().includes(q) ||
      (v.pais || "").toLowerCase().includes(q)
    );
    renderTabla(filtradas);
  }

  function limpiar() {
    if (confirm("¿Seguro que quieres borrar todo el registro de visitas?")) {
      localStorage.removeItem("visitas");
      todasLasVisitas = [];
      renderTabla([]);
      actualizarStats([]);
    }
  }

  function exportarCSV() {
    if (todasLasVisitas.length === 0) { alert("No hay datos para exportar."); return; }
    const header = ["#", "IP", "Ciudad", "País", "Fecha", "Hora", "Página"];
    const filas = todasLasVisitas.map((v, i) =>
      [i+1, v.ip, v.ciudad, v.pais, v.fecha, v.hora, v.pagina].join(",")
    );
    const csv = [header.join(","), ...filas].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "visitas_restaurante.csv";
    a.click();
  }

  // Iniciar
  renderTabla(todasLasVisitas);
  actualizarStats(todasLasVisitas);
</script>
</body>
</html>
